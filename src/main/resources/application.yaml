spring:
  application:
    name: ludotheque

  #Connection to DB
  datasource:
    url: jdbc:sqlserver://localhost;databasename=LUDO_BD;integratedSecurity=false;encrypt=false;trustServerCertificate=false
    username: LUDO_USER
    password: LUDO_PWD

  #Options to DB
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: create